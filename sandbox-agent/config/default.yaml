application:
  name: "Forensics Sandbox Agent"
  version: "0.1.0"
  environment: "development"
  theme: "light"

paths:
  logs_dir: "../../logs"
  exports_dir: "../../exports"
  simulator_catalog_dir: "../../simulators"

logging:
  level: "INFO"
  file_name: "agent.log"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  categories:
    - "app"
    - "monitoring"
    - "simulator"
    - "execution"
    - "forensics"
    - "vm"
    - "sandbox"

vm:
  provider: "virtualbox"
  require_vm_marker: true
  vm_marker_file: "C:/sandbox/guest.marker"
  snapshot_name: "CleanBaseline"

reporting:
  schema_version: "1.0.0"
  default_export_format: "json"

future_integrations:
  api_base_url: "http://localhost:8000"
  upload_enabled: false

execution_policy:
  sandbox_execution:
    vm_name: "ForensicsSandbox"
    snapshot_name: "CleanBaseline"
    execution_timeout_seconds: 300
    simulator_transfer_path: "C:/sandbox/simulators"
    guest_username: "guestuser"
    guest_password: "guest"
    guest_additions_timeout_seconds: 600
    start_headless: false
    transfer_runtime_dlls: false
    enable_auto_rollback: true
    max_concurrent_sessions: 1
    vm_startup_timeout_seconds: 120
    vm_shutdown_timeout_seconds: 60
    snapshot_restore_timeout_seconds: 180
  rollback_policy:
    enabled: true
    always_rollback_on_completion: true
    rollback_on_error: true
    max_rollback_attempts: 3
    preserve_logs_before_rollback: true
  isolation:
    require_vm_marker: true
    vm_marker_file: "C:/sandbox/guest.marker"
    disable_network: true
    disable_shared_folders: false
    enforce_single_vm: true

monitoring:
  process:
    enabled: true
    track_parent_child: true
    capture_command_line: true
    track_termination: true
    suspicious_threshold: 50
  file_system:
    enabled: true
    track_creation: true
    track_deletion: true
    track_modification: true
    track_extensions:
      - ".exe"
      - ".dll"
      - ".bat"
      - ".ps1"
      - ".vbs"
      - ".cmd"
    suspicious_file_count: 100
    suspicious_directory_patterns:
      - "Temp"
      - "AppData"
      - "Startup"
      - "System32"
  registry:
    enabled: true
    track_key_creation: true
    track_key_modification: true
    track_deletion: true
    track_autorun: true
    suspicious_paths:
      - "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run"
      - "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\RunOnce"
      - "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run"
      - "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\RunOnce"
  network:
    enabled: true
    track_outbound: true
    track_dns: true
    track_connections: true
    max_connections_per_minute: 100
    suspicious_ports:
      - 4444
      - 5555
      - 6666
      - 31337
      - 8080
      - 443
  storage:
    events_dir: "../../logs/monitoring"
    max_events_per_session: 10000
    retention_days: 30
    json_format: true
  behavior_detection:
    enabled: true
    detect_mass_file_mods: true
    detect_rapid_process_spawn: true
    detect_suspicious_registry: true
    detect_unusual_network: true
    detect_suspicious_paths: true
  vm_polling:
    enabled: true
    poll_interval_seconds: 5
    track_processes: true
    track_network: true
    track_files: true
    poll_directories:
      - "C:\\sandbox\\tmp"
    max_poll_duration_seconds: 600
    parse_simulator_log: true
